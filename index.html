<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0a0a12" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Axion" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icon.png" />
<title>Axion</title>
<script src="jsQR.js"></script>
<style>
  :root {
    --bg: #0a0a12; --card: #14141f; --card2: #1b1b2a; --line: #26263a;
    --text: #ececf3; --muted: #9a9ab0; --faint: #6a6a82;
    --accent: #6d5efc; --accent2: #8a7dff; --good: #37d39a; --bad: #ff5c6c; --amber: #ffb547;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased; }
  body { padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }
  #app { max-width: 640px; margin: 0 auto; padding: 16px 16px 96px; }
  h1 { font-size: 22px; margin: 8px 0 2px; letter-spacing: -0.02em; }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 18px; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 16px; margin-bottom: 12px; }
  .row { display: flex; align-items: center; gap: 10px; }
  .between { justify-content: space-between; }
  input, textarea, button { font: inherit; }
  input, textarea {
    width: 100%; background: var(--card2); border: 1px solid var(--line); color: var(--text);
    border-radius: 12px; padding: 13px 14px; margin-top: 8px; outline: none;
  }
  input:focus, textarea:focus { border-color: var(--accent); }
  label { font-size: 13px; color: var(--muted); font-weight: 600; }
  button {
    background: var(--accent); color: #fff; border: none; border-radius: 12px;
    padding: 13px 16px; font-weight: 650; cursor: pointer; width: 100%; font-size: 15px;
  }
  button:active { transform: translateY(1px); }
  button.ghost { background: transparent; border: 1px solid var(--line); color: var(--text); }
  button.small { width: auto; padding: 9px 14px; font-size: 13px; }
  .tabs { display: flex; gap: 8px; margin-bottom: 14px; }
  .tab { flex: 1; text-align: center; padding: 10px; border-radius: 12px; background: var(--card);
    border: 1px solid var(--line); color: var(--muted); font-weight: 600; font-size: 14px; cursor: pointer; }
  .tab.on { background: var(--accent); color: #fff; border-color: var(--accent); }
  .badge { font-size: 11px; font-weight: 700; padding: 4px 9px; border-radius: 999px; white-space: nowrap; }
  .b-requested { background: #2a2a1a; color: var(--amber); }
  .b-building { background: #1a2233; color: var(--accent2); }
  .b-done { background: #12281f; color: var(--good); }
  .b-failed { background: #2a1519; color: var(--bad); }
  .title { font-size: 15px; font-weight: 650; }
  .muted { color: var(--muted); font-size: 13px; }
  .faint { color: var(--faint); font-size: 12px; }
  .lane { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-top: 1px solid var(--line); }
  .lane:first-child { border-top: none; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex: none; }
  .d-pending { background: var(--faint); } .d-working { background: var(--accent2); box-shadow: 0 0 0 4px rgba(138,125,255,.15); }
  .d-done { background: var(--good); } .d-failed { background: var(--bad); }
  .emoji { font-size: 16px; width: 22px; text-align: center; }
  .fab { position: fixed; left: 50%; transform: translateX(-50%); bottom: calc(18px + env(safe-area-inset-bottom));
    width: min(608px, calc(100% - 32px)); box-shadow: 0 8px 30px rgba(109,94,252,.4); }
  .empty { text-align: center; color: var(--faint); padding: 40px 0; font-size: 14px; }
  .spin { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--line);
    border-top-color: var(--accent2); border-radius: 50%; animation: s .8s linear infinite; vertical-align: -2px; }
  @keyframes s { to { transform: rotate(360deg); } }
  .backlink { color: var(--accent2); font-size: 14px; background: none; border: none; width: auto; padding: 4px 0; text-align: left; }
  .err { color: var(--bad); font-size: 13px; margin-top: 10px; }
  .scan { position: fixed; inset: 0; background: #000; z-index: 50; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .scan video { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; }
  .scan .frame { position: relative; width: 66vw; max-width: 300px; aspect-ratio: 1; border: 3px solid #fff; border-radius: 20px; box-shadow: 0 0 0 100vmax rgba(0,0,0,.5); }
  .scan .hint { position: absolute; bottom: 18%; color: #fff; font-size: 15px; text-align: center; padding: 0 24px; text-shadow: 0 1px 4px #000; }
  .scan .x { position: absolute; top: calc(18px + env(safe-area-inset-top)); right: 18px; background: rgba(0,0,0,.5); color: #fff; border: none; border-radius: 999px; width: auto; padding: 10px 16px; }
  .or { text-align: center; color: var(--faint); font-size: 12px; margin: 14px 0; }
  /* --- PC tab --- */
  .pill { display: inline-flex; align-items: center; gap: 7px; font-size: 12px; font-weight: 650;
    padding: 6px 11px; border-radius: 999px; background: var(--card2); color: var(--muted); }
  .pill .dot { width: 7px; height: 7px; }
  .pill.on { color: var(--good); } .pill.off { color: var(--amber); }
  .sect { font-size: 12px; font-weight: 700; color: var(--faint); letter-spacing: .06em;
    text-transform: uppercase; margin: 20px 2px 8px; }
  .app { display: flex; align-items: center; gap: 12px; padding: 11px 0; border-top: 1px solid var(--line); }
  .app:first-child { border-top: none; }
  .app .meta { flex: 1; min-width: 0; }
  .app .meta .title { font-size: 14px; }
  .app .meta .faint { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  button.danger { background: transparent; border: 1px solid #46212a; color: var(--bad); }
  button.tiny { width: auto; padding: 8px 13px; font-size: 13px; flex: none; }
  .star { color: var(--accent2); font-size: 11px; }
  .note { border-radius: 12px; padding: 11px 13px; font-size: 13px; margin-bottom: 12px; }
  .note.wait { background: var(--card2); color: var(--muted); }
  .note.good { background: #12281f; color: var(--good); }
  .note.bad { background: #2a1519; color: var(--bad); }
</style>
</head>
<body>
<div id="app"></div>
<script>
const $ = (h) => { const d = document.createElement('div'); d.innerHTML = h.trim(); return d.firstChild }
const app = document.getElementById('app')
const esc = (s) => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))

// ---- config (Turso creds live only in this phone's localStorage) ----
const CFG_KEY = 'axion.cfg'
function loadCfg() {
  // Accept creds passed once via URL hash, then strip them from the address bar.
  if (location.hash.length > 1) {
    const p = new URLSearchParams(location.hash.slice(1))
    if (p.get('url') && p.get('token')) {
      localStorage.setItem(CFG_KEY, JSON.stringify({ url: p.get('url').replace(/\s+/g,''), token: p.get('token').replace(/\s+/g,'') }))
      history.replaceState(null, '', location.pathname + location.search)
    }
  }
  try { return JSON.parse(localStorage.getItem(CFG_KEY)) } catch { return null }
}
let cfg = loadCfg()

// ---- Turso ----
// Strip ALL whitespace — a token pasted on a phone often carries a stray space
// or newline, and even one invisible character makes fetch throw a TypeError.
const clean = (s) => String(s || '').replace(/\s+/g, '')
async function sql(stmts) {
  const url = clean(cfg.url), token = clean(cfg.token)
  const host = url.replace(/^libsql:\/\//i, 'https://').replace(/\/+$/, '')
  let res
  try {
    res = await fetch(host + '/v2/pipeline', {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ requests: [...stmts.map(s => ({ type: 'execute', stmt: s })), { type: 'close' }] }),
    })
  } catch (e) {
    // fetch throws a TypeError on a bad header value or no network.
    throw new Error('Could not reach the database. Check your connection and that the URL/token are correct (no spaces).')
  }
  if (res.status === 401) throw new Error('That token was not accepted. Copy it again exactly, or use the emailed link.')
  if (!res.ok) throw new Error('Database error ' + res.status)
  const body = await res.json()
  const out = []
  for (const r of body.results) {
    if (r.type === 'error') throw new Error(r.error.message)
    if (r.response?.result) out.push(r.response.result)
  }
  return out
}
const rows = (r) => r.rows.map(row => Object.fromEntries(r.cols.map((c, i) => [c.name, row[i]?.value ?? null])))
const uid = () => 'b' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7)

// ---- screens ----
// Parse a scanned/typed setup string (a full link, its #hash, or bare params).
function parseSetup(s) {
  const h = s.includes('#') ? s.slice(s.indexOf('#') + 1) : s
  try {
    const p = new URLSearchParams(h)
    const url = clean(p.get('url') || ''), token = clean(p.get('token') || '')
    if (url && token) return { url, token }
  } catch {}
  return null
}

// Validate + save config, then go to the app. Shared by scan and manual entry.
async function applyConfig(c, onErr) {
  cfg = { url: clean(c.url), token: clean(c.token) }
  try {
    await sql([{ sql: 'SELECT 1' }])
    localStorage.setItem(CFG_KEY, JSON.stringify(cfg))
    route()
  } catch (e) {
    cfg = null
    onErr ? onErr(e.message) : renderSetup(e.message)
  }
}

async function startScan() {
  if (typeof jsQR !== 'function') return renderSetup('Scanner could not load. Paste the values instead.')
  const overlay = $(`
    <div class="scan">
      <video id="vid" playsinline muted></video>
      <div class="frame"></div>
      <div class="hint">Point at the QR code on your computer screen</div>
      <button class="x" id="x">Cancel</button>
    </div>`)
  app.appendChild(overlay)
  const video = document.getElementById('vid')
  let stream
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false })
  } catch (e) {
    overlay.remove()
    return renderSetup('Camera not available (' + e.message + '). You can paste the values instead.')
  }
  video.srcObject = stream
  await video.play().catch(() => {})
  const canvas = document.createElement('canvas')
  const ctx = canvas.getContext('2d', { willReadFrequently: true })
  let stop = false
  const cleanup = () => { stop = true; stream.getTracks().forEach(t => t.stop()); overlay.remove() }
  document.getElementById('x').onclick = () => { cleanup(); renderSetup() }
  const tick = () => {
    if (stop) return
    if (video.readyState >= video.HAVE_ENOUGH_DATA && video.videoWidth) {
      canvas.width = video.videoWidth; canvas.height = video.videoHeight
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height)
      const img = ctx.getImageData(0, 0, canvas.width, canvas.height)
      const code = jsQR(img.data, img.width, img.height, { inversionAttempts: 'dontInvert' })
      const parsed = code && parseSetup(code.data)
      if (parsed) { cleanup(); applyConfig(parsed); return }
    }
    requestAnimationFrame(tick)
  }
  requestAnimationFrame(tick)
}

function renderSetup(err) {
  app.replaceChildren($(`
    <div>
      <h1>Connect Axion</h1>
      <div class="sub">Set up this phone once. Everything stays on your phone.</div>
      <div class="card">
        <button id="scan">📷 Scan the QR code</button>
        <div class="or">— or type it in —</div>
        <label>Database URL</label>
        <input id="u" placeholder="libsql://…turso.io" autocapitalize="off" autocorrect="off" spellcheck="false" />
        <label style="margin-top:14px;display:block">Auth token</label>
        <input id="t" placeholder="eyJ…" autocapitalize="off" autocorrect="off" spellcheck="false" />
        ${err ? `<div class="err">${esc(err)}</div>` : ''}
        <button class="ghost" style="margin-top:16px" id="go">Connect</button>
      </div>
    </div>`))
  document.getElementById('scan').onclick = startScan
  document.getElementById('go').onclick = () => {
    const url = clean(document.getElementById('u').value)
    const token = clean(document.getElementById('t').value)
    if (!url || !token) return renderSetup('Both fields are needed — or just tap “Scan the QR code”.')
    applyConfig({ url, token })
  }
}

let tab = 'builds'
let pollTimer = null
function stopPoll() { if (pollTimer) { clearInterval(pollTimer); pollTimer = null } }

async function renderHome() {
  stopPoll()
  const shell = (inner) => $(`
    <div>
      <div class="row between"><h1>Axion</h1><button class="small ghost" id="reset">⚙︎</button></div>
      <div class="sub">Your agents, from anywhere.</div>
      <div class="tabs">
        <div class="tab ${tab==='builds'?'on':''}" data-t="builds">Builds</div>
        <div class="tab ${tab==='apps'?'on':''}" data-t="apps">Apps</div>
        <div class="tab ${tab==='pc'?'on':''}" data-t="pc">PC</div>
      </div>
      <div id="list">${inner}</div>
    </div>`)
  const view = shell('<div class="empty"><span class="spin"></span> loading…</div>')
  app.replaceChildren(view)
  view.querySelector('#reset').onclick = () => { if (confirm('Disconnect this phone?')) { localStorage.removeItem(CFG_KEY); cfg = null; route() } }
  view.querySelectorAll('.tab').forEach(t => t.onclick = () => { tab = t.dataset.t; renderHome() })

  // The PC tab owns its own DOM and polling: re-rendering the whole pane every
  // few seconds would wipe out whatever is typed in its search box.
  if (tab === 'pc') return renderPc()

  const paint = async () => {
    try {
      if (tab === 'builds') {
        const r = await sql([{ sql: `SELECT id,name,status,verify_summary,error,created_at FROM remote_builds ORDER BY created_at DESC LIMIT 40` }])
        const list = rows(r[0])
        document.getElementById('list').replaceChildren($(buildsHtml(list)))
        bindBuilds(list)
      } else {
        const r = await sql([{ sql: `SELECT name,path FROM remote_apps ORDER BY name LIMIT 200` }])
        document.getElementById('list').replaceChildren($(appsHtml(rows(r[0]))))
      }
    } catch (e) {
      document.getElementById('list').replaceChildren($(`<div class="err">${esc(e.message)}</div>`))
    }
  }
  await paint()
  pollTimer = setInterval(paint, 4000)

  if (tab === 'builds') {
    const fab = $(`<button class="fab" id="new">+ New app</button>`)
    view.appendChild(fab)
    fab.onclick = renderNew
  }
}

function statusBadge(s) { return `<span class="badge b-${esc(s)}">${s==='building'?'<span class="spin"></span> building':esc(s)}</span>` }

function buildsHtml(list) {
  if (!list.length) return `<div class="empty">No builds yet.<br>Tap “+ New app” to start one.</div>`
  return `<div>${list.map(b => `
    <div class="card" data-id="${esc(b.id)}" data-open="1" style="cursor:pointer">
      <div class="row between">
        <div class="title">${esc(b.name)}</div>
        ${statusBadge(b.status)}
      </div>
      ${b.status==='done' && b.verify_summary ? `<div class="muted" style="margin-top:6px">${esc(b.verify_summary)}</div>`:''}
      ${b.status==='failed' && b.error ? `<div class="err">${esc(b.error)}</div>`:''}
    </div>`).join('')}</div>`
}
function bindBuilds(list) {
  document.querySelectorAll('[data-open]').forEach(el => el.onclick = () => renderBuild(el.dataset.id, list.find(b => b.id === el.dataset.id)))
}

function appsHtml(list) {
  if (!list.length) return `<div class="empty">No apps found on your PC yet.</div>`
  return `<div>${list.map(a => `
    <div class="card"><div class="title">${esc(a.name)}</div><div class="faint" style="margin-top:4px">${esc(a.path)}</div></div>`).join('')}</div>`
}

// ---- PC control ----------------------------------------------------------
// Talks to the pc_* tables that the always-on helper on the PC owns
// (Desktop\Claude\axion-pc-remote). The phone only ever WRITES a request and
// READS what the PC mirrored back; it can't run anything directly, and it never
// learns a file path — "open Quantower" is an id the PC looks up for itself.

const t = (v) => ({ type: 'text', value: String(v) })
const sleep = (ms) => new Promise(r => setTimeout(r, ms))
let pcNote = null      // {text, kind:'wait'|'good'|'bad'}
let pcLaunchers = []
let pcFilter = ''
let pcShowAll = false

/** A heartbeat older than 90s means nobody is home. */
const pcOnline = (iso) => iso && (Date.now() - new Date(iso).getTime()) < 90000

function agoText(iso) {
  if (!iso) return 'never'
  const s = Math.max(0, Math.round((Date.now() - new Date(iso).getTime()) / 1000))
  if (s < 60) return s + 's ago'
  if (s < 3600) return Math.round(s / 60) + 'm ago'
  return Math.round(s / 3600) + 'h ago'
}

function noteHtml() {
  if (!pcNote) return ''
  const spin = pcNote.kind === 'wait' ? '<span class="spin"></span> ' : ''
  return `<div class="note ${pcNote.kind}">${spin}${esc(pcNote.text)}</div>`
}
function paintNote() {
  const el = document.getElementById('pcnote')
  if (el) el.innerHTML = noteHtml()
}

/**
 * Send one request and wait for the PC to report back.
 * The PC is the only thing that can say whether it worked, so we watch the row
 * rather than optimistically claiming success.
 */
async function sendPc(device, action, target, label) {
  const id = uid()
  const now = new Date().toISOString()
  pcNote = { text: (action === 'close' ? 'Closing ' : 'Opening ') + label + '…', kind: 'wait' }
  paintNote()
  try {
    await sql([{
      sql: `INSERT INTO pc_commands (id,device,action,target,status,created_at,updated_at)
            VALUES (?,?,?,?,'requested',?,?)`,
      args: [t(id), t(device), t(action), t(target), t(now), t(now)],
    }])
  } catch (e) {
    pcNote = { text: e.message, kind: 'bad' }; paintNote(); return
  }

  for (let i = 0; i < 30; i++) {
    await sleep(700)
    let row
    try {
      const r = await sql([{ sql: `SELECT status,error FROM pc_commands WHERE id=?`, args: [t(id)] }])
      row = rows(r[0])[0]
    } catch { continue }
    if (row?.status === 'done') {
      pcNote = { text: (action === 'close' ? 'Closed ' : 'Opened ') + label, kind: 'good' }
      paintNote(); await pcRefresh(); setTimeout(() => { pcNote = null; paintNote() }, 3500); return
    }
    if (row?.status === 'failed') {
      pcNote = { text: row.error || 'It didn’t work.', kind: 'bad' }
      paintNote(); setTimeout(() => { pcNote = null; paintNote() }, 5000); return
    }
  }
  pcNote = { text: 'Your PC didn’t answer. Is it awake?', kind: 'bad' }
  paintNote()
}

let pcDevice = null
async function pcRefresh() {
  const r = await sql([
    { sql: `SELECT device, updated_at FROM pc_heartbeat ORDER BY updated_at DESC LIMIT 1` },
    { sql: `SELECT device, pid, name, title FROM pc_windows ORDER BY name` },
    { sql: `SELECT device, id, name, source FROM pc_launchers ORDER BY source, name` },
  ])
  const hb = rows(r[0])[0]
  pcDevice = hb?.device || null
  const wins = rows(r[1]).filter(w => !pcDevice || w.device === pcDevice)
  pcLaunchers = rows(r[2]).filter(l => !pcDevice || l.device === pcDevice)

  const st = document.getElementById('pcstatus')
  if (st) {
    const on = pcOnline(hb?.updated_at)
    st.innerHTML = `<span class="pill ${on ? 'on' : 'off'}">
      <span class="dot ${on ? 'd-done' : 'd-pending'}"></span>
      ${on ? esc(pcDevice || 'PC') + ' online' : 'PC asleep · ' + agoText(hb?.updated_at)}</span>`
  }
  const openEl = document.getElementById('pcopen')
  if (openEl) { openEl.replaceChildren($(openHtml(wins))); bindOpen(wins) }
  paintLaunchers()
}

function openHtml(wins) {
  if (!wins.length) return `<div class="card"><div class="muted">Nothing open right now.</div></div>`
  return `<div class="card">${wins.map(w => `
    <div class="app">
      <div class="meta">
        <div class="title">${esc(w.name)}</div>
        <div class="faint">${esc(w.title)}</div>
      </div>
      <button class="tiny danger" data-close="${esc(w.pid)}" data-label="${esc(w.name)}">Close</button>
    </div>`).join('')}</div>`
}
function bindOpen(wins) {
  document.querySelectorAll('[data-close]').forEach(el => {
    el.onclick = () => {
      if (!confirm('Close ' + el.dataset.label + ' on your PC?\n\nIf it has unsaved work it will ask you on the PC.')) return
      sendPc(pcDevice, 'close', el.dataset.close, el.dataset.label)
    }
  })
}

function paintLaunchers() {
  const el = document.getElementById('pclaunch')
  if (!el) return
  const q = pcFilter.trim().toLowerCase()
  let list = pcLaunchers.filter(l => !q || l.name.toLowerCase().includes(q))
  // Without a search, lead with the Desktop shortcuts he actually curated.
  const total = list.length
  if (!q && !pcShowAll) list = list.slice(0, 10)

  el.replaceChildren($(`
    <div>
      <div class="card">${list.length ? list.map(l => `
        <div class="app">
          <div class="meta"><div class="title">${esc(l.name)} ${l.source === 'desktop' ? '<span class="star">★</span>' : ''}</div></div>
          <button class="tiny ghost" data-launch="${esc(l.id)}" data-label="${esc(l.name)}">Open</button>
        </div>`).join('') : '<div class="muted">Nothing matches.</div>'}</div>
      ${(!q && !pcShowAll && total > 10) ? `<button class="ghost small" id="more" style="width:100%">Show all ${total} apps</button>` : ''}
    </div>`))

  el.querySelectorAll('[data-launch]').forEach(b => {
    b.onclick = () => sendPc(pcDevice, 'launch', b.dataset.launch, b.dataset.label)
  })
  const more = document.getElementById('more')
  if (more) more.onclick = () => { pcShowAll = true; paintLaunchers() }
}

async function renderPc() {
  const list = document.getElementById('list')
  list.replaceChildren($(`
    <div>
      <div id="pcnote">${noteHtml()}</div>
      <div id="pcstatus"><span class="pill"><span class="spin"></span> checking…</span></div>
      <div class="sect">Open right now</div>
      <div id="pcopen"><div class="empty"><span class="spin"></span> loading…</div></div>
      <div class="sect">Open an app</div>
      <input id="pcq" placeholder="Search your apps…" autocapitalize="off" autocorrect="off" spellcheck="false" />
      <div id="pclaunch" style="margin-top:10px"></div>
    </div>`))

  const q = document.getElementById('pcq')
  q.value = pcFilter
  q.oninput = () => { pcFilter = q.value; paintLaunchers() }

  // The PC only sweeps its windows every 30s to stay light on a machine that's
  // usually mid-trade. Opening this tab is the moment it matters, so ask for a
  // fresh look — quietly, no note, whether or not it lands.
  let nudged = false
  const nudge = async () => {
    if (nudged || !pcDevice) return
    nudged = true
    const now = new Date().toISOString()
    try {
      await sql([{
        sql: `INSERT INTO pc_commands (id,device,action,target,status,created_at,updated_at)
              VALUES (?,?,'refresh','','requested',?,?)`,
        args: [t(uid()), t(pcDevice), t(now), t(now)],
      }])
    } catch { /* the poll will catch up anyway */ }
  }

  const go = async () => {
    try {
      await pcRefresh()
      nudge()
    } catch (e) {
      // The helper creates these tables on first run. Say so plainly instead of
      // showing a raw SQL error.
      const missing = /no such table/i.test(e.message)
      document.getElementById('pcopen').replaceChildren($(`<div class="card"><div class="muted">${
        missing ? 'The PC helper isn’t set up yet. Run the installer once on your computer.' : esc(e.message)
      }</div></div>`))
      const st = document.getElementById('pcstatus')
      if (st) st.innerHTML = `<span class="pill off"><span class="dot d-pending"></span> not connected</span>`
    }
  }
  await go()
  pollTimer = setInterval(go, 5000)
}

async function renderBuild(id, meta) {
  stopPoll()
  const view = $(`
    <div>
      <button class="backlink" id="back">‹ Builds</button>
      <div class="row between" style="margin-top:6px"><h1 style="font-size:20px">${esc(meta?.name || 'Build')}</h1><span id="st"></span></div>
      <div id="act" class="faint" style="margin:2px 0 14px"></div>
      <div class="card" id="lanes"><div class="empty"><span class="spin"></span> loading…</div></div>
    </div>`)
  app.replaceChildren(view)
  view.querySelector('#back').onclick = renderHome

  const paint = async () => {
    try {
      const r = await sql([
        { sql: `SELECT status,verify_summary,error FROM remote_builds WHERE id=?`, args: [{ type:'text', value:id }] },
        { sql: `SELECT role,emoji,status,summary,seq FROM remote_build_agents WHERE build_id=? ORDER BY seq`, args: [{ type:'text', value:id }] },
        { sql: `SELECT line FROM remote_build_activity WHERE build_id=?`, args: [{ type:'text', value:id }] },
      ])
      const b = rows(r[0])[0] || {}
      const agents = rows(r[1])
      const act = rows(r[2])[0]
      document.getElementById('st').innerHTML = statusBadge(b.status || 'requested')
      document.getElementById('act').textContent = act?.line || ''
      const seen = {}
      const lanes = agents.filter(a => { if (seen[a.role]) return false; seen[a.role] = 1; return true })
      document.getElementById('lanes').replaceChildren($(lanesHtml(lanes, b)))
      if (b.status === 'done' || b.status === 'failed') stopPoll()
    } catch (e) {
      document.getElementById('lanes').replaceChildren($(`<div class="err">${esc(e.message)}</div>`))
    }
  }
  await paint()
  pollTimer = setInterval(paint, 3000)
}
function lanesHtml(agents, b) {
  let h = ''
  if (!agents.length) h += `<div class="muted">Waiting for your PC to pick this up…<br><span class="faint">Make sure Axion is open on your computer.</span></div>`
  h += agents.map(a => `
    <div class="lane">
      <span class="emoji">${esc(a.emoji||'•')}</span>
      <div style="flex:1">
        <div class="title" style="font-size:14px">${esc(a.role)}</div>
        ${a.summary ? `<div class="faint">${esc(a.summary).slice(0,120)}</div>`:''}
      </div>
      <span class="dot d-${esc(a.status||'pending')}"></span>
    </div>`).join('')
  if (b.status === 'done' && b.verify_summary) h += `<div class="lane"><span class="emoji">✅</span><div class="muted">${esc(b.verify_summary)}</div></div>`
  if (b.status === 'failed' && b.error) h += `<div class="lane"><span class="emoji">❌</span><div class="err" style="margin:0">${esc(b.error)}</div></div>`
  return `<div>${h}</div>`
}

function renderNew() {
  stopPoll()
  const view = $(`
    <div>
      <button class="backlink" id="back">‹ Cancel</button>
      <h1 style="font-size:20px;margin-top:6px">New app</h1>
      <div class="sub">Describe it. Your PC builds it and you watch here.</div>
      <div class="card">
        <label>Name</label>
        <input id="n" placeholder="Tip calculator" />
        <label style="margin-top:14px;display:block">What should it do?</label>
        <textarea id="d" rows="4" placeholder="A simple tip calculator where I enter a bill and pick a tip %."></textarea>
        <div class="err" id="err" style="display:none"></div>
        <button style="margin-top:16px" id="send">Send to my PC</button>
      </div>
    </div>`)
  app.replaceChildren(view)
  view.querySelector('#back').onclick = renderHome
  view.querySelector('#send').onclick = async () => {
    const name = document.getElementById('n').value.trim()
    const desc = document.getElementById('d').value.trim()
    if (!name) { const e = document.getElementById('err'); e.style.display='block'; e.textContent='Give it a name.'; return }
    const now = new Date().toISOString()
    try {
      await sql([{
        sql: `INSERT INTO remote_builds (id,name,description,status,device,created_at,updated_at) VALUES (?,?,?,'requested','phone',?,?)`,
        args: [{type:'text',value:uid()},{type:'text',value:name},{type:'text',value:desc},{type:'text',value:now},{type:'text',value:now}],
      }])
      tab = 'builds'; renderHome()
    } catch (e) {
      const el = document.getElementById('err'); el.style.display='block'; el.textContent = e.message
    }
  }
}

function route() { if (!cfg) renderSetup(); else renderHome() }
route()
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{})
</script>
